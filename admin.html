<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير - المكتبة الصوتية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .auth-container input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .auth-container button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .playlists-list {
            margin-top: 30px;
        }
        .playlist-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .delete-btn:hover { background: #c0392b; }
        .hidden { display: none; }
        .local-warning {
            background: #f39c12;
            color: #2c3e50;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body class="admin-page">
    <div id="auth-container" class="auth-container">
        <i class="fas fa-lock" style="font-size: 48px; color: #3498db;"></i>
        <h2>لوحة تحكم المدير</h2>
        <p>الرجاء إدخال كلمة المرور للمتابعة</p>
        <input type="password" id="admin-password" placeholder="كلمة المرور">
        <button onclick="checkPassword()">تسجيل الدخول</button>
        <div id="auth-error" style="color: red; margin-top: 10px;"></div>
    </div>

    <div id="admin-content" class="admin-container hidden">
        <div class="admin-header">
            <h1><i class="fas fa-tools"></i> لوحة التحكم</h1>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
        </div>
        
        <div class="local-warning" id="local-warning" style="display: none;">
            <i class="fas fa-info-circle"></i> ⚠️ أنت تعمل محلياً (file://). تأكد من أن مفتاح YouTube API يعمل.
        </div>
        
        <div class="form-container">
            <h2><i class="fas fa-plus-circle"></i> إضافة سلسلة جديدة</h2>
            <div class="input-group">
                <label for="apiKey"><i class="fas fa-key"></i> مفتاح YouTube API:</label>
                <input type="password" id="apiKey" placeholder="أدخل مفتاح API">
                <small>احصل عليه من <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a></small>
            </div>
            <div class="input-group">
                <label for="playlistUrl"><i class="fab fa-youtube"></i> رابط قائمة التشغيل:</label>
                <input type="url" id="playlistUrl" placeholder="https://youtube.com/playlist?list=...">
            </div>
            <div class="input-group">
                <label for="sheikhName"><i class="fas fa-user"></i> اسم الشيخ:</label>
                <input type="text" id="sheikhName" placeholder="مثال: الشيخ محمد بن صالح العثيمين">
            </div>
            <div class="input-group">
                <label for="seriesName"><i class="fas fa-book-open"></i> اسم السلسلة:</label>
                <input type="text" id="seriesName" placeholder="مثال: تفسير القرآن الكريم">
            </div>
            <button id="add-button" onclick="addPlaylist()">
                <i class="fas fa-cloud-upload-alt"></i> إضافة إلى Firebase
            </button>
            <div id="status"></div>
        </div>

        <div class="playlists-list">
            <h3><i class="fas fa-list"></i> السلاسل الحالية</h3>
            <div id="existing-playlists"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        // إظهار تحذير للعمل المحلي
        if (window.location.protocol === 'file:') {
            document.getElementById('local-warning').style.display = 'block';
        }
        
        // كلمة المرور
        const ADMIN_PASSWORD = "admin123";
        
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCpjKIDFovVT6lhINojXSBphf1YkErqbHQ",
            authDomain: "telgramfiles.firebaseapp.com",
            projectId: "telgramfiles",
            storageBucket: "telgramfiles.firebasestorage.app",
            messagingSenderId: "895894298208",
            appId: "1:895894298208:web:9dcb6f93cfa12d93692d05"
        };
        
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            console.log('Firebase initialized');
        } catch (error) {
            console.error('Firebase init error:', error);
        }
        
        function checkPassword() {
            const password = document.getElementById('admin-password').value;
            const errorDiv = document.getElementById('auth-error');
            
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_auth', 'true');
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadExistingPlaylists();
                errorDiv.textContent = '';
            } else {
                errorDiv.textContent = 'كلمة المرور غير صحيحة';
            }
        }
        
        function logout() {
            localStorage.removeItem('admin_auth');
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('admin-content').classList.add('hidden');
            document.getElementById('admin-password').value = '';
        }
        
        function checkAuth() {
            if (localStorage.getItem('admin_auth') === 'true') {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadExistingPlaylists();
            }
        }
        
        async function loadExistingPlaylists() {
            if (!db) return;
            const container = document.getElementById('existing-playlists');
            container.innerHTML = '<p>جاري التحميل...</p>';
            
            try {
                const snapshot = await db.collection("playlists").orderBy("createdAt", "desc").get();
                if (snapshot.empty) {
                    container.innerHTML = '<p>لا توجد سلاسل مضافة بعد</p>';
                    return;
                }
                
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'playlist-item';
                    div.innerHTML = `
                        <div>
                            <strong>${escapeHtml(data.series)}</strong><br>
                            <small>${escapeHtml(data.sheikh)} | ${data.videos.length} درس</small>
                        </div>
                        <button class="delete-btn" onclick="deletePlaylist('${doc.id}')">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                container.innerHTML = '<p style="color: red;">خطأ في تحميل السلاسل: ' + error.message + '</p>';
                console.error(error);
            }
        }
        
        async function deletePlaylist(playlistId) {
            if (!confirm('هل أنت متأكد من حذف هذه السلسلة؟')) return;
            
            try {
                await db.collection("playlists").doc(playlistId).delete();
                showStatus('تم حذف السلسلة بنجاح', 'success');
                loadExistingPlaylists();
            } catch (error) {
                showStatus('فشل الحذف: ' + error.message, 'error');
            }
        }
        
        async function addPlaylist() {
            if (!db) {
                showStatus('خطأ في الاتصال بقاعدة البيانات', 'error');
                return;
            }
            
            const button = document.getElementById('add-button');
            const statusDiv = document.getElementById('status');
            const apiKey = document.getElementById('apiKey').value;
            const url = document.getElementById('playlistUrl').value;
            const sheikh = document.getElementById('sheikhName').value;
            const series = document.getElementById('seriesName').value;
            
            if (!apiKey || !url || !sheikh || !series) {
                showStatus('الرجاء ملء جميع الحقول', 'error');
                return;
            }
            
            const playlistIdMatch = url.match(/list=([a-zA-Z0-9_-]+)/);
            if (!playlistIdMatch) {
                showStatus('رابط قائمة التشغيل غير صالح', 'error');
                return;
            }
            
            const playlistId = playlistIdMatch[1];
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري العمل...';
            
            try {
                showStatus('1/3: جاري جلب الدروس من يوتيوب...', 'loading');
                
                let videos = [];
                let nextPageToken = '';
                let pageCount = 0;
                const maxPages = 10;
                
                do {
                    pageCount++;
                    const ytUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${apiKey}&pageToken=${nextPageToken}`;
                    const response = await fetch(ytUrl);
                    const data = await response.json();
                    
                    if (data.error) throw new Error(data.error.message);
                    
                    if (data.items) {
                        data.items.forEach(item => {
                            if (item.snippet.title !== "Private video" && 
                                item.snippet.title !== "Deleted video" &&
                                !item.snippet.title.includes("[Private video]")) {
                                videos.push({
                                    videoId: item.snippet.resourceId.videoId,
                                    title: item.snippet.title
                                });
                            }
                        });
                    }
                    
                    nextPageToken = data.nextPageToken;
                } while (nextPageToken && pageCount < maxPages);
                
                if (videos.length === 0) throw new Error("لم يتم العثور على فيديوهات");
                
                showStatus(`2/3: جاري حفظ ${videos.length} درس في Firebase...`, 'loading');
                
                await db.collection("playlists").doc(playlistId).set({
                    playlistId: playlistId,
                    sheikh: sheikh,
                    series: series,
                    videos: videos,
                    videosCount: videos.length,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showStatus(`✅ تمت إضافة "${series}" بنجاح! (${videos.length} درس)`, 'success');
                
                // تفريغ الحقول
                document.getElementById('apiKey').value = '';
                document.getElementById('playlistUrl').value = '';
                document.getElementById('sheikhName').value = '';
                document.getElementById('seriesName').value = '';
                
                loadExistingPlaylists();
                
            } catch (error) {
                showStatus('❌ فشل: ' + error.message, 'error');
            } finally {
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> إضافة إلى Firebase';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        checkAuth();
    </script>
</body>
</html>
